# 测试环境配置 - 连接统一测试数据库
spring:
  cloud:
    nacos:
      discovery:
        namespace: test
      config:
        namespace: test
  datasource:
    url: jdbc:mysql://test-db-server:3306/your_service_test?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${TEST_DB_USERNAME:test_user}
    password: ${TEST_DB_PASSWORD:test_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10

logging:
  level:
    com.bajie: INFO
    org.springframework: debug


