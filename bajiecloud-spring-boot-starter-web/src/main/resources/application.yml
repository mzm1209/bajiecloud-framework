# 默认配置 - 所有环境通用设置
spring:
  cloud:
    nacos:
      discovery:
        server-addr: ${mse.nacos.server-addr:nacos-test.example.com:8848}
        namespace: test
        group: DEFAULT_GROUP
      config:
        server-addr: ${mse.nacos.server-addr:nacos-test.example.com:8848}
        namespace: test
        group: DEFAULT_GROUP
        file-extension: yaml
  application:
    name: bajie-cloud
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    hikari:
      pool-name: HikariPool
      auto-commit: true
      validation-timeout: 3000

server:
  port: 8080
  servlet:
    context-path: /

mybatis-plus:
  mapper-locations:
    - classpath*:mapper/*.xml
    - classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true
    cache-enabled: false
  global-config:
    db-config:
      id-type: AUTO
      logic-delete-field: delete_flag #全局逻辑删除字段名
      logic-delete-value: UNIX_TIMESTAMP()
      logic-not-delete-value: 0

jwt:
  secret: mySecretKeyForJWTTokenGenerationAndValidation
  expiration: 86400000 # 24小时

redisson:
  config: |
    singleServerConfig:
      address: "redis://${spring.data.redis.host}:${spring.data.redis.port}"
      password: ${spring.data.redis.password}
      database: ${spring.data.redis.database}

