spring:
  cloud:
    # 开发环境，可以去mse 上申请个人空间
    nacos:
      discovery:
        namespace: ${NACOS_NAMESPACE:dev-${user.name}}
      config:
        namespace: ${NACOS_NAMESPACE:dev-${user.name}}
  # 开发环境配置 - 连接个人开发数据库
  datasource:
    url: jdbc:mysql://localhost:3036/your_service_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: ${DEV_DB_USERNAME:root}
    password: ${DEV_DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0



logging:
  level:
    com.bajie: DEBUG
    org.springframework: INFO


